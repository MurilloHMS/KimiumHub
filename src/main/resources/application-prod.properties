spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
server.port=${SERVER_PORT}

api.security.token.secret=${JWT_TOKEN}
app.master-key=${MASTER_KEY}
public-secret.expiration-hours=${EXPIRATION_HOURS}
app.base-url=${BASE_URL}

mail.from=${EMAIL_FROM}
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.from=${SMTP_FROM}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false


logging.level.root=INFO
logging.file.name=logs.log
logging.file.path=logs

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=2GB

storage.curriculos.path=/app/curriculos
storage.image.path=/app/upload/images
storage.equipment.image.path=/app/upload/equipment
storage.holerite.path=/app/funcionario/holerite
storage.documents.path=/app/funcionario/documentos
storage.reimbursements.path=/app/funcionario/reembolsos
storage.medical-certificates.path=/app/funcionario/atestados
report.logo.empresa=classpath:/templates/images/logo.png

# Web Push (VAPID)
push.vapid.public.key=${VAPID_PUBLIC_KEY:}
push.vapid.private.key=${VAPID_PRIVATE_KEY:}
push.vapid.subject=${VAPID_SUBJECT:mailto:contato@proautokimium.com.br}

server.tomcat.max-part-count=600

server.tomcat.max-part-header-size=2048
server.tomcat.max-http-form-post-size=2147483647
server.tomcat.max-swallow-size=2147483647

